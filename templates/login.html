<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<title>Papelería Dary</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background: linear-gradient(135deg,#0f172a,#2563eb);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-card{
    border:none;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0px 10px 30px rgba(0,0,0,.25);
}

.login-left{
    padding:40px;
}

.login-left h2{
    font-weight:bold;
}

.login-left p{
    color:gray;
}

.form-control{
    border-radius:10px;
    height:45px;
}

.btn-login{
    border-radius:10px;
    height:45px;
    font-weight:bold;
}

.login-img{
    width:100%;
    height:100%;
    object-fit:cover;
}

</style>

</head>

<body>

<div class="container">

```
<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card login-card">

            <div class="row g-0">

                <div class="col-md-6 login-left">

                    <h2>📚 Papelería Dary</h2>

                    <p>
                    Sistema de Gestión Administrativa
                    </p>

                    <form method="POST" action="/login">

                        <div class="mb-3">

                            <label>
                            👤 Usuario
                            </label>

                            <input
                            type="text"
                            name="usuario"
                            class="form-control"
                            required>

                        </div>

                        <div class="mb-3">

                            <label>
                            🔒 Contraseña
                            </label>

                            <input
                            type="password"
                            name="password"
                            class="form-control"
                            required>

                        </div>

                        <button
                        class="btn btn-primary w-100 btn-login">

                            Ingresar

                        </button>

                    </form>

                </div>

                <div class="col-md-6">

                    <img
                    src="{{ url_for('static', filename='img/papeleria.jpg') }}"
                    class="login-img">

                </div>

            </div>

        </div>

    </div>

</div>
```

</div>

</body>

</html>
