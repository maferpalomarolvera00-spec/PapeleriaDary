<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Estadísticas</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-4">

<h1>📈 Estadísticas del Sistema</h1>

<a href="/dashboard" class="btn btn-secondary">
Volver
</a>

<div class="card shadow p-3">

<canvas id="miGrafica"></canvas>

</div>

<br>

<div class="row">

<div class="col-md-6">

<div class="card shadow p-3">

<h4>📦 Estado del Inventario</h4>

<canvas id="inventarioChart"></canvas>

</div>

</div>

<div class="col-md-6">

<div class="card shadow p-3">

<h4>💰 Ventas vs Clientes</h4>

<canvas id="ventasClientesChart"></canvas>

</div>

</div>

</div>

</div>

<script>

const ctx = document.getElementById('miGrafica');

new Chart(ctx, {

    type: 'bar',

    data: {

        labels: [
            'Productos',
            'Clientes',
            'Ventas'
        ],

        datasets: [{

            label: 'Cantidad',

            data: [
    Number("{{ productos }}"),
    Number("{{ clientes }}"),
    Number("{{ ventas }}")
]
        }]
    }

});

</script>

<script>

const inventarioCtx =
document.getElementById('inventarioChart');

new Chart(inventarioCtx, {

    type: 'pie',

    data: {

        labels: [
            'Stock Normal',
            'Stock Bajo',
            'Agotados'
        ],

        datasets: [{

            data: [
                Number("{{ stock_normal }}"),
                Number("{{ stock_bajo }}"),
                Number("{{ agotados }}")
            ]

        }]

    }

});

const ventasClientesCtx =
document.getElementById('ventasClientesChart');

new Chart(ventasClientesCtx, {

    type: 'doughnut',

    data: {

        labels: [
            'Ventas',
            'Clientes'
        ],

        datasets: [{

            data: [
                Number("{{ ventas }}"),
                Number("{{ clientes }}")
            ]

        }]

    }

});

</script>

</body>

</html>
