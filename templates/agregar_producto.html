<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Agregar Producto</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header">

<h2>➕ Agregar Producto</h2>

</div>

<div class="card-body">

<form method="POST" action="/guardar_producto">

<div class="mb-3">

<label>Nombre</label>

<input
type="text"
name="nombre"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Descripción</label>

<textarea
name="descripcion"
class="form-control"
required></textarea>

</div>

<div class="mb-3">

<label>Precio Compra</label>

<input
type="number"
step="0.01"
name="precioCompra"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Precio Venta</label>

<input
type="number"
step="0.01"
name="precioVenta"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Stock Actual</label>

<input
type="number"
name="stockActual"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Stock Mínimo</label>

<input
type="number"
name="stockMinimo"
class="form-control"
required>

</div>

<div class="mb-3">

<label>ID Proveedor</label>

<input
type="number"
name="idProveedor"
class="form-control"
required>

</div>

<button
class="btn btn-success">

Guardar Producto

</button>

<a
href="/productos"
class="btn btn-secondary">

Cancelar

</a>

</form>

</div>

</div>

</div>

</body>

</html>
