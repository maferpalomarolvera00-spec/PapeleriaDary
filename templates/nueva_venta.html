<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Nueva Venta</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-4">

<h1>💰 Nueva Venta</h1>

<form method="POST" action="/guardar_venta">

<div class="mb-3">

<label>Cliente</label>

<select
name="cliente"
class="form-control">

{% for cliente in clientes %}

<option value="{{ cliente[0] }}">
{{ cliente[1] }} {{ cliente[2] }} {{ cliente[3] }}
</option>

{% endfor %}

</select>

</div>

<div class="mb-3">

<label>Producto</label>

<select
name="producto"
class="form-control">

{% for producto in productos %}

<option value="{{ producto[0] }}"
{% if producto[3] == 0 %}disabled{% endif %}>
{{ producto[1] }} - ${{ producto[2] }} - Stock: {{ producto[3] }}
</option>

{% endfor %}

</select>

</div>

<div class="mb-3">

<label>Cantidad</label>

<input
type="number"
name="cantidad"
class="form-control"
min="1"
required>

</div>

<button
type="submit"
class="btn btn-success">

Registrar Venta

</button>

</form>

</div>

</body>

</html>
