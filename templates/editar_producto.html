<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Editar Producto</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header">

<h2>✏️ Editar Producto</h2>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label>Nombre</label>

<input
type="text"
name="nombre"
class="form-control"
value="{{ producto[1] }}"
required>

</div>

<div class="mb-3">

<label>Precio Venta</label>

<input
type="number"
step="0.01"
name="precioVenta"
class="form-control"
value="{{ producto[4] }}"
required>

</div>

<div class="mb-3">

<label>Stock Actual</label>

<input
type="number"
name="stockActual"
class="form-control"
value="{{ producto[5] }}"
required>

</div>

<button class="btn btn-primary">
Guardar Cambios
</button>

<a href="/productos" class="btn btn-secondary">
Cancelar
</a>

</form>

</div>

</div>

</div>

</body>

</html>
