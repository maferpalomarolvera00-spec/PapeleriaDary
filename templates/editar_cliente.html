<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Editar Cliente</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-4">

<div class="card">

<div class="card-header">
<h2>✏ Editar Cliente</h2>
</div>

<div class="card-body">

<form method="POST">

<label>Nombre</label>

<input
type="text"
name="nombre"
class="form-control mb-3"
value="{{ cliente[1] }}"
required>

<label>Apellido Paterno</label>

<input
type="text"
name="aPaterno"
class="form-control mb-3"
value="{{ cliente[2] }}"
required>

<label>Apellido Materno</label>

<input
type="text"
name="aMaterno"
class="form-control mb-3"
value="{{ cliente[3] }}"
required>

<button
type="submit"
class="btn btn-warning">

Actualizar

</button>

<a
href="/clientes"
class="btn btn-secondary">

Volver

</a>

</form>

</div>

</div>

</div>

</body>

</html>
